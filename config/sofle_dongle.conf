# =========================================================
# ZMK 核心系统配置 (Core System Settings)
# =========================================================

# [按键消抖时间] 
# 降低延迟，建议保持在 5-10 之间。
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=7
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# [系统休眠设置]
# Dongle 作为接收器通常插在电脑上不断电，建议关闭深度休眠。
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_EXT_POWER=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
# [闲置超时时间] (单位：毫秒)
# 长时间不操作后的待机时间。3000000ms = 50分钟。
CONFIG_ZMK_IDLE_TIMEOUT=3000000

# [输入线程堆栈大小]
# 含义：为处理高频输入事件分配的内存。
# 影响：小红点汇报率高，值过小会导致系统内存溢出死机。
# 范围：[1024 ~ 8192] 字节。2048 非常安全，一般不需要修改。
CONFIG_INPUT_THREAD_STACK_SIZE=2048

