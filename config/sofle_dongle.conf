# =========================================================
# TrackPoint 小红点核心配置 (TrackPoint Core Settings)
# =========================================================

# [指数加速开关]
# 含义：类似 Windows 的“提高指针精确度”。
# 影响：轻推光标慢且精准，重推光标速度呈指数级暴增，适合大屏/多屏。设为 n 则为纯线性速度。
# 范围：y (开启) / n (关闭)
CONFIG_TRACKPOINT_EXPONENTIAL=y

# [模式切换按键位置]
# 含义：触发“鼠标/滚轮”功能切换的按键位置。
# 影响：按住键盘矩阵上该位置的按键时，小红点功能会反转。
# 在矩阵索引上查这个键，仅限有小红点那侧的键盘。
CONFIG_TRACKPOINT_TOGGLE_KEY_POSITION=62

# [默认模式设置]
# 含义：小红点开机时的默认行为。
# 影响：
#   y = 默认推小红点是“滚轮”，按住切换键时变成“鼠标”。
#   n = 默认推小红点是“鼠标”，按住切换键时变成“滚轮”(ThinkPad 经典行为)。
# 范围：y / n
CONFIG_TRACKPOINT_START_IN_SCROLL_MODE=n


# =========================================================
# TrackPoint 鼠标手感配置 (Mouse Sensitivity Settings)
# =========================================================

# [鼠标基础速度倍率] (百分比)
# 含义：全局速度的“大闸”。50 代表 0.5 倍。
# 影响：觉得光标整体太飘就调小，觉得太慢就调大。
# 范围：[10 ~ 500] (10为极慢，200+非常快)
CONFIG_TRACKPOINT_MOUSE_BASE_SPEED_PERCENT=50

# [鼠标灵敏度基准] (百分比)
# 含义：LED亮度最低(或关闭)时的最基础灵敏度附加值。30 代表 0.3 倍。
# 影响：决定了基础手感底线。当前代码逻辑中，总灵敏度 = 基准 + (亮度 * 步长)。
# 范围：[0 ~ 200]
CONFIG_TRACKPOINT_MOUSE_SENS_BASE_PERCENT=30


# =========================================================
# TrackPoint 滚轮手感配置 (Scroll Settings)
# =========================================================

# [滚轮防抖死区]
# 含义：过滤微小位移的死区值。
# 影响：过滤手指放在小红点上的轻微颤抖。值越大，越不容易误触滚轮，但需要稍微用力推才能触发滚动。
# 范围：[0 ~ 10] (0为无死区，推荐 1~3)
CONFIG_TRACKPOINT_SCROLL_DEADZONE=2

# [慢速滚动除数 - 精细控制]
# 含义：轻轻推小红点时的阻尼。
# 影响：数值越大，轻轻推时网页滚得越慢、越丝滑（一格一格滚）。
# 范围：[20 ~ 150] (必须大于 FAST 值)
CONFIG_TRACKPOINT_SCROLL_DIVISOR_SLOW=60

# [快速滚动除数 - 速度极限]
# 含义：用力推到底时的阻尼。
# 影响：数值越小，用力推时网页飞奔得越快。
# 范围：[1 ~ 30] (必须小于 SLOW 值)
CONFIG_TRACKPOINT_SCROLL_DIVISOR_FAST=20


# =========================================================
# Custom LED 提示灯与 DPI 调节配置 (LED & DPI Settings)
# =========================================================

# [降低亮度/DPI 按键位置]
# 含义：按此键，LED 变暗，同时小红点移动变慢 (DPI 降低)。
# 范围：[0 ~ 255]
CONFIG_CUSTOM_LED_BRT_DOWN_POS=49

# [升高亮度/DPI 按键位置]
# 含义：按此键，LED 变亮，同时小红点移动变快 (DPI 升高)。
# 范围：[0 ~ 255]
CONFIG_CUSTOM_LED_BRT_UP_POS=50

# [开机默认亮度]
# 含义：每次 Dongle 通电开机时的默认 LED 亮度（即默认 DPI 档位）。
# 影响：如果觉得开机鼠标太快，可以把这个值调低。
# 范围：[10 ~ 255] (代码中限制了最低可见亮度 BRT_MIN 为 10)

# 4k屏建议值:
CONFIG_CUSTOM_LED_BRT_DEFAULT=191

# 1080p建议值？凭感觉推测的还没尝试。
# CONFIG_CUSTOM_LED_BRT_DEFAULT= 

# [亮度/DPI 调节步长]
# 含义：每次按下调节键时，亮度变化的幅度。
# 影响：调大此值(如20)，只需按几次就能拉满或降到底；调小此值(如5)，可以非常细腻地微调 DPI。
# 范围：[1 ~ 100] (推荐 8~25)
CONFIG_CUSTOM_LED_BRT_STEP=8


# =========================================================
# 补充的 TrackPoint 高级配置 (Supplementary TrackPoint Settings)
# =========================================================

# [横向滚动方向乘数 (Horizontal Scroll Direction Multiplier)]
# 含义：控制横向滚轮的方向。
# 范围：1 (正常) / -1 (反向)
CONFIG_TRACKPOINT_SCROLL_X_DIR=1

# [纵向滚动方向乘数 (Vertical Scroll Direction Multiplier)]
# 含义：控制纵向滚轮的方向。
# 范围：1 (正常) / -1 (反向)
CONFIG_TRACKPOINT_SCROLL_Y_DIR=1

# [最大滚动输入值 (Maximum Scroll Input)]
# 含义：限制单次读取的小红点最大数据量，防止产生过激的滚动突变 (Spikes)。
# 范围：默认 128 (通常不需要修改，除非你的硬件输出非常极端的数据)
CONFIG_TRACKPOINT_SCROLL_INPUT_MAX=128

# [防误触主导轴判定 - 分子 (Dominant Axis Numerator)]
# 含义：用于判定当前是“纯横向滚动”还是“纯纵向滚动”的阈值比例分子。
# 机制：与下方的分母 (Denominator) 配合使用。当一条轴的位移量超过另一条轴的 (分子/分母) 倍时，驱动会锁定为单轴滚动，屏蔽另一条轴的数据，以防止对角线斜向滚动的误触 (Accidental Touch)。默认比例为 3/2 (1.5倍)。
CONFIG_TRACKPOINT_DOMINANT_NUMERATOR=3

# [防误触主导轴判定 - 分母 (Dominant Axis Denominator)]
# 含义：用于判定防误触锁定的分母。
CONFIG_TRACKPOINT_DOMINANT_DENOMINATOR=2

# [鼠标灵敏度附加步长 (Mouse Sensitivity Step)]
# 含义：每增加 1 档自定义 LED 亮度 (LED Brightness)，鼠标额外增加的灵敏度百分比 (Percentage)。
# 影响：驱动中的计算逻辑为：总灵敏度 = 基础灵敏度 + (亮度 * 附加步长)。例如默认 1 代表 0.01 倍，如果当前亮度为 100，就会在基础之上再增加 1.0 倍速度。
CONFIG_TRACKPOINT_MOUSE_SENS_STEP_PERCENT=1
